<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categoria - AvenoX RP</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="status-pill"><span class="dot green"></span><span id="players-count">--/--</span> Giocatori</div>
      <div class="status-pill"><span class="dot blurple"></span><span id="discord-count">--</span> su Discord</div>
    </div>
  </div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo"><img src="assets/logo.png" alt="AvenoX RP" class="logo-img"></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html" class="active">Shop</a></li>
        <li><a href="regolamento.html">Regolamento</a></li>
        <li><a href="streamer.html">Streamer</a></li>
      </ul>
      <button class="burger" id="burger">&#9776;</button>
    </div>
  </nav>

  <div class="page-hero">
    <a href="shop.html" class="back-link">&larr; Torna alle categorie</a>
    <h1 id="category-title">Categoria</h1>
    <p id="category-subtitle"></p>
  </div>

  <section class="section">
    <div id="products-grid" class="shop-grid"></div>
  </section>

  <!-- PRODUCT DETAILS MODAL -->
  <div id="product-modal" class="modal">
    <div class="modal-content product-modal-content">
      <span class="modal-close" id="product-close">&times;</span>
      <div class="product-modal-body">
        <div class="product-modal-img" id="product-modal-img"></div>
        <div class="product-modal-info">
          <h3 id="product-modal-name"></h3>
          <p id="product-modal-desc"></p>
          <ul id="product-modal-details"></ul>
          <span class="shop-price" id="product-modal-price"></span>
        </div>
      </div>
    </div>
  </div>

  <footer class="endbar">
    <div class="endbar-left">
      <img src="assets/logo.png" alt="AvenoX RP" class="endbar-logo" onerror="this.style.display='none'">
    </div>
    <div class="endbar-center">
      <a href="#" id="link-discord" target="_blank" class="social-btn discord">Discord</a>
      <a href="#" id="link-tiktok" target="_blank" class="social-btn tiktok">TikTok</a>
      <a href="#" id="link-youtube" target="_blank" class="social-btn youtube">YouTube</a>
    </div>
    <div class="endbar-right">
      <a href="#" id="server-status-link" target="_blank" class="server-status">
        <span class="dot green"></span><span>Server Status</span>
      </a>
    </div>
  </footer>
  <div class="copyright">&copy; <span id="year"></span> AvenoX RP. Tutti i diritti riservati.</div>

  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/shop-category.js"></script>
</body>
</html>
